<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel – ODRA</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: Arial, sans-serif; background: #f4f6f9; }
        .header {
            display: flex; align-items: center; justify-content: space-between;
            background-color: #2c3e50; padding: 15px 30px; color: white; flex-wrap: wrap;
        }
        .logo img { width: 150px; height: auto; }
        .title-section { text-align: center; flex-grow: 1; }
        .company-name { font-size: 1.5rem; font-weight: bold; }
        .nav-menu a { color: white; text-decoration: none; margin-left: 20px; background: #1a252f; padding: 8px 15px; border-radius: 5px; }
        .container { max-width: 1200px; margin: 30px auto; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; margin-bottom: 30px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input, select, button { padding: 8px 12px; margin: 5px; border-radius: 5px; border: 1px solid #ccc; }
        button { background: #2c3e50; color: white; cursor: pointer; border: none; }
        button.danger { background: #e74c3c; }
        button.all-access { background: #27ae60; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #2c3e50; color: white; }
        .error { color: red; }
        .success { color: green; }
        .subtab-group { margin: 10px 0; padding: 10px; background: #f8f9fa; border-radius: 5px; }
        .log-entry { font-family: monospace; font-size: 0.9em; }
        .log-controls { margin-bottom: 10px; }
        .empty-msg { color: #6c757d; font-style: italic; padding: 10px; }
        .all-access-badge { background: #27ae60; color: white; padding: 2px 8px; border-radius: 12px; font-size: 0.8em; display: inline-block; }
    </style>
</head>
<body>
<div class="header">
    <div class="logo"><img src="logo1.jpg" alt="ODRA Logo"></div>
    <div class="title-section"><div class="company-name">ODRA Admin Panel</div></div>
    <div class="nav-menu">
        <a href="index.html">Home</a>
        <a href="dept.html">Dept Wise</a>
        <a href="admin.html">Admin</a>
    </div>
</div>
<div class="container" id="adminContainer"></div>

<script>
    const ADMIN_USER = "admin";
    const ADMIN_PASS = "admin123";

    // ---------- EMPTY INITIAL DATA ----------
    const emptyDepartments = {};
    const emptyEmployees = [];

    // ---------- LOGGING SYSTEM ----------
    function getLogs() {
        return JSON.parse(localStorage.getItem("adminLogs")) || [];
    }
    function saveLogs(logs) {
        if (logs.length > 200) logs = logs.slice(-200);
        localStorage.setItem("adminLogs", JSON.stringify(logs));
    }
    function addLog(action, details) {
        let logs = getLogs();
        logs.push({
            timestamp: new Date().toISOString(),
            action: action,
            details: details,
            admin: "admin"
        });
        saveLogs(logs);
        const logContainer = document.getElementById("logDisplayArea");
        if (logContainer) renderLogs();
    }
    function renderLogs() {
        const logs = getLogs();
        let html = `<div class="log-controls">
                        <button onclick="exportLogs()">📥 Export Logs (JSON)</button>
                        <button onclick="clearLogs()" class="danger">🗑 Clear All Logs</button>
                    </div>
                    <table style="width:100%">
                        <thead><tr><th>Timestamp</th><th>Action</th><th>Details</th></tr></thead>
                        <tbody>`;
        if (logs.length === 0) {
            html += `<tr><td colspan="3" class="empty-msg">No logs yet. Actions will appear here.</td></tr>`;
        } else {
            logs.slice().reverse().forEach(log => {
                html += `<tr class="log-entry">
                            <td>${new Date(log.timestamp).toLocaleString()}</td>
                            <td>${escapeHtml(log.action)}</td>
                            <td>${escapeHtml(log.details)}</td>
                          </tr>`;
            });
        }
        html += `</tbody></table>`;
        const logArea = document.getElementById("logDisplayArea");
        if (logArea) logArea.innerHTML = html;
    }
    function exportLogs() {
        const logs = getLogs();
        const dataStr = JSON.stringify(logs, null, 2);
        const blob = new Blob([dataStr], {type: "application/json"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `odra_admin_logs_${new Date().toISOString().slice(0,19)}.json`;
        a.click();
        URL.revokeObjectURL(url);
    }
    function clearLogs() {
        if (confirm("Delete all activity logs?")) {
            localStorage.setItem("adminLogs", JSON.stringify([]));
            renderLogs();
            addLog("Cleared logs", "All activity logs were cleared.");
        }
    }
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // ---------- INITIALIZE EMPTY DATA ----------
    function initData() {
        if (!localStorage.getItem("departments")) {
            localStorage.setItem("departments", JSON.stringify(emptyDepartments));
        }
        if (!localStorage.getItem("employees")) {
            localStorage.setItem("employees", JSON.stringify(emptyEmployees));
        }
        if (!localStorage.getItem("adminLogs")) {
            localStorage.setItem("adminLogs", JSON.stringify([]));
        }
    }

    let adminLoggedIn = false;

    function renderAdminLogin() {
        document.getElementById("adminContainer").innerHTML = `
            <div class="card" style="max-width:400px; margin:auto;">
                <h2>Admin Login</h2>
                <input type="text" id="adminUser" placeholder="Username">
                <input type="password" id="adminPass" placeholder="Password">
                <button onclick="adminLogin()">Login</button>
                <div id="loginError" class="error"></div>
            </div>
        `;
    }

    function adminLogin() {
        const user = document.getElementById("adminUser").value;
        const pass = document.getElementById("adminPass").value;
        if (user === ADMIN_USER && pass === ADMIN_PASS) {
            adminLoggedIn = true;
            addLog("Admin Login", "Admin logged into the panel.");
            renderAdminPanel();
        } else {
            document.getElementById("loginError").innerText = "Invalid admin credentials";
        }
    }

    // ========== MAIN ADMIN PANEL ==========
    function renderAdminPanel() {
        const departments = JSON.parse(localStorage.getItem("departments"));
        const employees = JSON.parse(localStorage.getItem("employees"));
        const allDepts = Object.keys(departments);

        // ---- Manage Departments & Sub-tabs ----
        let deptHtml = `<h3>📁 Manage Departments & Sub‑tabs</h3>`;
        if (allDepts.length === 0) {
            deptHtml += `<div class="empty-msg">No departments yet. Use the form below to create your first department.</div>`;
        } else {
            for (let dept of allDepts) {
                let subtabs = departments[dept];
                deptHtml += `<div class="subtab-group" id="deptGroup-${dept}">
                    <strong>${dept}</strong>
                    <div>Sub‑tabs: <span id="subtabList-${dept}">${subtabs.join(", ")}</span></div>
                    <input type="text" id="newSubtab-${dept}" placeholder="New subtab name">
                    <button onclick="addSubtab('${dept}')">+ Add Subtab</button>
                    <button onclick="removeSubtab('${dept}')">- Remove Last</button>
                </div>`;
            }
        }
        deptHtml += `<div style="margin-top:15px;">
            <input type="text" id="newDeptName" placeholder="New department name (e.g., Marketing, Finance)">
            <button onclick="addDepartment()">➕ Add Department</button>
        </div>`;

        // ---- Add Employee Form (with All Access checkbox) ----
        let addEmpForm = `<div class="card"><h2>➕ Add New Employee</h2>`;
        if (allDepts.length === 0) {
            addEmpForm += `<div class="empty-msg">You need to create at least one department before adding employees.</div>`;
        } else {
            addEmpForm += `
                <input type="text" id="newName" placeholder="Full Name">
                <input type="text" id="newPass" placeholder="Password">
                <label style="display:block; margin:10px 0;">
                    <input type="checkbox" id="newAllAccess"> 🚀 Grant All Access (all departments & all sub-tabs)
                </label>
                <div id="deptSelectArea" style="margin-top:10px;">
                    <div>Or select specific departments & sub‑tabs (Ctrl+click for multiple):</div>`;
            for (let dept of allDepts) {
                addEmpForm += `<div><strong>${dept}</strong>
                    <select multiple id="newPerm-${dept}" style="width:200px; height:80px;">
                        ${departments[dept].map(sub => `<option value="${sub}">${sub}</option>`).join('')}
                    </select>
                </div>`;
            }
            addEmpForm += `</div><button onclick="addEmployee()">Add Employee</button><div id="addMsg"></div>`;
        }
        addEmpForm += `</div>`;

        // ---- Employee List ----
        let empTableHtml = `<div class="card"><h2>📋 Employee List & Permissions</h2>`;
        if (employees.length === 0) {
            empTableHtml += `<div class="empty-msg">No employees added yet. Use the form above to add.</div>`;
        } else {
            let empRows = "";
            employees.forEach((emp, idx) => {
                const hasAllAccess = emp.allAccess === true;
                const permissionsDisplay = hasAllAccess ? '<span class="all-access-badge">ALL ACCESS</span>' : (Object.keys(emp.permissions).join(", ") || "None");
                let permHtml = "";
                if (!hasAllAccess) {
                    for (let dept of allDepts) {
                        let currentSubs = emp.permissions[dept] || [];
                        let subtabs = departments[dept] || [];
                        permHtml += `<div><strong>${dept}</strong>: 
                            <select multiple id="perm-${idx}-${dept}" style="width:200px; height:80px;">`;
                        subtabs.forEach(sub => {
                            let selected = currentSubs.includes(sub) ? "selected" : "";
                            permHtml += `<option value="${sub}" ${selected}>${sub}</option>`;
                        });
                        permHtml += `</select></div>`;
                    }
                } else {
                    permHtml = `<div class="empty-msg">All Access enabled – employee sees every department and sub‑tab.</div>`;
                }
                empRows += `
                    <tr id="empRow-${idx}">
                        <td>${emp.name}${hasAllAccess ? ' <span class="all-access-badge">ALL</span>' : ''}</td>
                        <td>${permissionsDisplay}</td>
                        <td>
                            ${!hasAllAccess ? `<button onclick="grantAllAccess(${idx})" class="all-access">🌟 Grant All Access</button>` : ''}
                            <button onclick="editPermissions(${idx})">✏️ Edit Permissions</button>
                            <button onclick="resetPassword(${idx})">Reset Password</button>
                            <button class="danger" onclick="deleteEmployee(${idx})">Delete</button>
                        </td>
                     </tr>
                    <tr id="permRow-${idx}" style="display:none;">
                        <td colspan="3">
                            <div id="permEdit-${idx}">${permHtml}</div>
                            <button onclick="savePermissions(${idx})">Save Permissions</button>
                            <button onclick="cancelEdit(${idx})">Cancel</button>
                            ${hasAllAccess ? '<br><small>All Access enabled – no specific permissions to edit.</small>' : ''}
                        </td>
                     </tr>
                `;
            });
            empTableHtml += `
                <table><thead><tr><th>Name</th><th>Access</th><th>Actions</th></tr></thead>
                <tbody>${empRows}</tbody></table>`;
        }
        empTableHtml += `</div>`;

        // Activity Logs section
        const logsHtml = `<div class="card">
            <h2>📜 Activity Logs</h2>
            <div id="logDisplayArea"></div>
        </div>`;

        const finalHtml = `
            <div class="card">${deptHtml}</div>
            ${addEmpForm}
            ${empTableHtml}
            ${logsHtml}
        `;
        document.getElementById("adminContainer").innerHTML = finalHtml;
        renderLogs();
    }

    // ---- Grant All Access to existing employee ----
    function grantAllAccess(idx) {
        if (confirm("Grant ALL ACCESS to this employee? They will see every department and all sub-tabs.")) {
            let employees = JSON.parse(localStorage.getItem("employees"));
            let empName = employees[idx].name;
            employees[idx].allAccess = true;
            employees[idx].permissions = {}; // clear specific permissions
            localStorage.setItem("employees", JSON.stringify(employees));
            addLog("Grant All Access", `Granted all access to employee "${empName}".`);
            renderAdminPanel();
        }
    }

    // ---- Department & Subtab Management ----
    function addDepartment() {
        let newDept = document.getElementById("newDeptName").value.trim();
        if (!newDept) return;
        let departments = JSON.parse(localStorage.getItem("departments"));
        if (departments[newDept]) {
            alert("Department already exists!");
            return;
        }
        departments[newDept] = ["General"];
        localStorage.setItem("departments", JSON.stringify(departments));
        addLog("Add Department", `Created department "${newDept}" with default subtab "General".`);
        renderAdminPanel();
        document.getElementById("newDeptName").value = "";
    }
    function addSubtab(dept) {
        let depts = JSON.parse(localStorage.getItem("departments"));
        let newSub = document.getElementById(`newSubtab-${dept}`).value.trim();
        if (newSub && !depts[dept].includes(newSub)) {
            depts[dept].push(newSub);
            localStorage.setItem("departments", JSON.stringify(depts));
            addLog("Add Subtab", `Added subtab "${newSub}" to department "${dept}".`);
            renderAdminPanel();
        }
    }
    function removeSubtab(dept) {
        let depts = JSON.parse(localStorage.getItem("departments"));
        if (depts[dept].length > 1) {
            let removed = depts[dept].pop();
            localStorage.setItem("departments", JSON.stringify(depts));
            addLog("Remove Subtab", `Removed subtab "${removed}" from department "${dept}".`);
            renderAdminPanel();
        } else {
            alert("At least one subtab required.");
        }
    }

    // ---- Employee Management ----
    function addEmployee() {
        const name = document.getElementById("newName").value.trim();
        const pass = document.getElementById("newPass").value.trim();
        const allAccess = document.getElementById("newAllAccess")?.checked || false;
        const departments = JSON.parse(localStorage.getItem("departments"));
        let permissions = {};
        if (!allAccess) {
            for (let dept of Object.keys(departments)) {
                let select = document.getElementById(`newPerm-${dept}`);
                if (select) {
                    let selected = Array.from(select.selectedOptions).map(opt => opt.value);
                    if (selected.length > 0) permissions[dept] = selected;
                }
            }
        }
        if (!name || !pass) {
            document.getElementById("addMsg").innerText = "Name and password required";
            return;
        }
        if (!allAccess && Object.keys(permissions).length === 0) {
            document.getElementById("addMsg").innerText = "Either grant All Access or select at least one permission";
            return;
        }
        let employees = JSON.parse(localStorage.getItem("employees"));
        if (employees.find(e => e.name.toLowerCase() === name.toLowerCase())) {
            document.getElementById("addMsg").innerText = "Employee already exists";
            return;
        }
        let newEmp = { name, password: pass };
        if (allAccess) {
            newEmp.allAccess = true;
        } else {
            newEmp.permissions = permissions;
        }
        employees.push(newEmp);
        localStorage.setItem("employees", JSON.stringify(employees));
        addLog("Add Employee", `Added employee "${name}"${allAccess ? " with ALL ACCESS" : " with specific permissions"}`);
        document.getElementById("addMsg").innerHTML = '<span class="success">Added successfully</span>';
        renderAdminPanel();
    }
    function editPermissions(idx) {
        let row = document.getElementById(`permRow-${idx}`);
        row.style.display = row.style.display === "none" ? "table-row" : "none";
    }
    function cancelEdit(idx) {
        document.getElementById(`permRow-${idx}`).style.display = "none";
    }
    function savePermissions(idx) {
        let employees = JSON.parse(localStorage.getItem("employees"));
        let emp = employees[idx];
        if (emp.allAccess) {
            alert("All Access employee – no specific permissions to edit.");
            cancelEdit(idx);
            return;
        }
        let departments = JSON.parse(localStorage.getItem("departments"));
        let newPerms = {};
        for (let dept of Object.keys(departments)) {
            let select = document.getElementById(`perm-${idx}-${dept}`);
            if (select) {
                let selected = Array.from(select.selectedOptions).map(opt => opt.value);
                if (selected.length > 0) newPerms[dept] = selected;
            }
        }
        emp.permissions = newPerms;
        localStorage.setItem("employees", JSON.stringify(employees));
        addLog("Edit Permissions", `Updated permissions for "${emp.name}": ${JSON.stringify(newPerms)}`);
        renderAdminPanel();
    }
    function resetPassword(idx) {
        let newPass = prompt("Enter new password:");
        if (newPass && newPass.trim()) {
            let employees = JSON.parse(localStorage.getItem("employees"));
            let empName = employees[idx].name;
            employees[idx].password = newPass.trim();
            localStorage.setItem("employees", JSON.stringify(employees));
            addLog("Reset Password", `Reset password for employee "${empName}".`);
            alert("Password reset");
            renderAdminPanel();
        }
    }
    function deleteEmployee(idx) {
        if (confirm("Delete employee?")) {
            let employees = JSON.parse(localStorage.getItem("employees"));
            let empName = employees[idx].name;
            employees.splice(idx, 1);
            localStorage.setItem("employees", JSON.stringify(employees));
            addLog("Delete Employee", `Deleted employee "${empName}".`);
            renderAdminPanel();
        }
    }

    initData();
    renderAdminLogin();
</script>
</body>
</html>
