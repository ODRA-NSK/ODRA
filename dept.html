<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dept Wise – Restricted</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
        }
        /* Same header style as index.html */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #f8f9fa;
            padding: 15px 30px;
            border-bottom: 2px solid #dee2e6;
            flex-wrap: wrap;
        }
        .logo img {
            width: 200px;
            height: auto;
            display: block;
        }
        .title-section {
            text-align: center;
            flex-grow: 1;
        }
        .company-name {
            font-size: 1.8rem;
            font-weight: bold;
            color: #2c3e50;
        }
        .subtitle {
            font-size: 1.2rem;
            color: #6c757d;
            margin-top: 8px;
        }
        .nav-menu a {
            text-decoration: none;
            color: #2c3e50;
            margin-left: 20px;
            font-weight: bold;
            padding: 8px 12px;
            border-radius: 5px;
        }
        .nav-menu a:hover {
            background-color: #e9ecef;
        }
        @media (max-width: 700px) {
            .header {
                flex-direction: column;
                text-align: center;
            }
            .logo { margin-bottom: 15px; }
            .nav-menu { margin-top: 10px; }
            .nav-menu a { margin: 0 10px; }
        }

        /* Login & content area */
        .container {
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            text-align: center;
        }
        .login-box {
            background: #f8f9fa;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            display: inline-block;
            width: 300px;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            background: #2c3e50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background: #1a252f;
        }
        .error {
            color: red;
            margin-top: 10px;
        }
        .dept-content {
            display: none;
            text-align: left;
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .dept-content table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        .dept-content th, .dept-content td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        .dept-content th {
            background-color: #2c3e50;
            color: white;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">
        <img src="logo1.jpg" alt="ODRA Logo">
    </div>
    <div class="title-section">
        <div class="company-name">Odra by Navya Sangam Kriti</div>
        <div class="subtitle">Management Information System</div>
    </div>
    <div class="nav-menu">
        <a href="index.html">Home</a>
        <a href="dept.html">Dept Wise</a>
    </div>
</div>

<div class="container">
    <div id="loginArea">
        <div class="login-box">
            <h3>Employee Login</h3>
            <input type="text" id="username" placeholder="Employee ID or Name">
            <input type="password" id="password" placeholder="Password">
            <button onclick="login()">Login</button>
            <div id="errorMsg" class="error"></div>
        </div>
    </div>

    <div id="deptContent" class="dept-content">
        <h2>Department-wise Data</h2>
        <p>Welcome, <span id="userName"></span>! You have access to:</p>
        <div id="departmentTable"></div>
        <button onclick="logout()" style="margin-top:20px; background:#6c757d;">Logout</button>
    </div>
</div>

<script>
    // ========== AUTHORIZED EMPLOYEES LIST ==========
    // Add or remove employees here. Each employee has:
    // - username (what they type)
    // - password (simple, can be changed)
    // - displayName (shown after login)
    // - department (what they can see – you can customize)
    const authorizedEmployees = [
        { username: "emp001", password: "odra123", displayName: "Alice Sharma", department: "Sales" },
        { username: "emp002", password: "odra456", displayName: "Bob Kumar", department: "IT" },
        { username: "admin", password: "admin123", displayName: "Admin User", department: "All Departments" }
    ];

    // Department data (what you want to show)
    const deptData = {
        "Sales": [
            { "Employee": "Alice Sharma", "Target": "100 units", "Achieved": "80 units" },
            { "Employee": "John Doe", "Target": "150 units", "Achieved": "140 units" }
        ],
        "IT": [
            { "Employee": "Bob Kumar", "Task": "Server Maintenance", "Status": "Completed" },
            { "Employee": "Sara Lee", "Task": "Database Update", "Status": "In Progress" }
        ],
        "All Departments": [
            { "Department": "Sales", "Metric": "Revenue", "Value": "$50K" },
            { "Department": "IT", "Metric": "Tickets Closed", "Value": "23" },
            { "Department": "HR", "Metric": "New Hires", "Value": "4" }
        ]
    };

    function login() {
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value.trim();
        const errorDiv = document.getElementById("errorMsg");

        const employee = authorizedEmployees.find(emp => emp.username === username && emp.password === password);

        if (employee) {
            // Store login info in sessionStorage (clears when browser closed)
            sessionStorage.setItem("loggedIn", "true");
            sessionStorage.setItem("userDisplay", employee.displayName);
            sessionStorage.setItem("userDept", employee.department);
            showContent(employee);
        } else {
            errorDiv.innerText = "Invalid Employee ID or Password. Access denied.";
        }
    }

    function showContent(employee) {
        document.getElementById("loginArea").style.display = "none";
        document.getElementById("deptContent").style.display = "block";
        document.getElementById("userName").innerText = employee.displayName;

        // Decide which data to show based on department
        let dataToShow = [];
        if (employee.department === "All Departments") {
            dataToShow = deptData["All Departments"];
        } else if (deptData[employee.department]) {
            dataToShow = deptData[employee.department];
        } else {
            dataToShow = [{ "Info": "No data available for your department." }];
        }

        // Build HTML table
        if (dataToShow.length === 0) {
            document.getElementById("departmentTable").innerHTML = "<p>No data found.</p>";
            return;
        }

        const headers = Object.keys(dataToShow[0]);
        let tableHtml = "<table><tr>";
        headers.forEach(h => {
            tableHtml += `<th>${h}</th>`;
        });
        tableHtml += "</tr>";
        dataToShow.forEach(row => {
            tableHtml += "<tr>";
            headers.forEach(h => {
                tableHtml += `<td>${row[h] || ""}</td>`;
            });
            tableHtml += "</tr>";
        });
        tableHtml += "</table>";
        document.getElementById("departmentTable").innerHTML = tableHtml;
    }

    function logout() {
        sessionStorage.clear();
        location.reload();
    }

    // Check if already logged in (e.g., after refresh)
    window.onload = function() {
        const loggedIn = sessionStorage.getItem("loggedIn");
        if (loggedIn === "true") {
            const displayName = sessionStorage.getItem("userDisplay");
            const dept = sessionStorage.getItem("userDept");
            showContent({ displayName: displayName, department: dept });
        } else {
            document.getElementById("loginArea").style.display = "block";
            document.getElementById("deptContent").style.display = "none";
        }
    }
</script>

</body>
</html>
