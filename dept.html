<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dept Wise – ODRA</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: Arial, sans-serif; background: #f4f6f9; }
        .header {
            display: flex; align-items: center; justify-content: space-between;
            background-color: #f8f9fa; padding: 15px 30px; border-bottom: 2px solid #dee2e6;
            flex-wrap: wrap;
        }
        .logo img { width: 200px; height: auto; }
        .title-section { text-align: center; flex-grow: 1; }
        .company-name { font-size: 1.8rem; font-weight: bold; color: #2c3e50; }
        .subtitle { font-size: 1.2rem; color: #6c757d; }
        .nav-menu a { text-decoration: none; color: #2c3e50; margin-left: 20px; font-weight: bold; padding: 8px 12px; border-radius: 5px; }
        .nav-menu a:hover { background-color: #e9ecef; }
        .container { max-width: 1000px; margin: 30px auto; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input, button { padding: 8px 12px; margin: 5px; border-radius: 5px; border: 1px solid #ccc; }
        button { background: #2c3e50; color: white; cursor: pointer; border: none; }
        button.secondary { background: #6c757d; }
        .dept-selector, .subtab-selector { margin: 15px 0; }
        .dept-btn, .subtab-btn { background: #e9ecef; color: #2c3e50; margin-right: 10px; }
        .dept-btn.active, .subtab-btn.active { background: #2c3e50; color: white; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #2c3e50; color: white; }
        .error { color: red; }
        .success { color: green; }
        .all-access-badge { background: #27ae60; color: white; padding: 2px 8px; border-radius: 12px; font-size: 0.8em; margin-left: 10px; }
    </style>
</head>
<body>
<div class="header">
    <div class="logo"><img src="logo1.jpg" alt="ODRA Logo"></div>
    <div class="title-section">
        <div class="company-name">Odra by Navya Sangam Kriti</div>
        <div class="subtitle">Management Information System</div>
    </div>
    <div class="nav-menu">
        <a href="index.html">Home</a>
        <a href="dept.html">Dept Wise</a>
        <a href="admin.html">Admin</a>
    </div>
</div>
<div class="container" id="appContainer"></div>

<script>
    // Sample content for each subtab (edit as needed)
    const subtabContent = {     "HR": {         "Payslip": `<iframe src="payslip.html" style="width:100%; height:700px; border:none;"></iframe>`     } };
        // You will populate this as you create departments/subtabs
        // Example:
        // "Sales": { "Overview": "Sales data...", "Targets": "Targets..." }
    };

    function getDepartments() {
        return JSON.parse(localStorage.getItem("departments")) || {};
    }
    function getEmployees() {
        return JSON.parse(localStorage.getItem("employees")) || [];
    }

    let currentEmployee = null; // { name, allAccess?, permissions? }

    function renderLogin() {
        document.getElementById("appContainer").innerHTML = `
            <div class="card" style="max-width:400px; margin:auto;">
                <h2>Employee Login</h2>
                <input type="text" id="empName" placeholder="Full Name">
                <input type="password" id="empPass" placeholder="Password">
                <button onclick="login()">Login</button>
                <div id="loginError" class="error"></div>
                <hr><p><a href="admin.html">Admin login</a></p>
            </div>
        `;
    }

    function login() {
        const name = document.getElementById("empName").value.trim();
        const pass = document.getElementById("empPass").value.trim();
        const employees = getEmployees();
        const emp = employees.find(e => e.name.toLowerCase() === name.toLowerCase() && e.password === pass);
        if (emp) {
            currentEmployee = { 
                name: emp.name, 
                allAccess: emp.allAccess === true,
                permissions: emp.permissions || {}
            };
            sessionStorage.setItem("loggedInEmp", JSON.stringify(currentEmployee));
            renderEmployeePanel();
        } else {
            document.getElementById("loginError").innerText = "Invalid name or password";
        }
    }

    function renderEmployeePanel() {
        const departments = getDepartments();
        const allDepts = Object.keys(departments);
        let accessibleDepts = [];
        if (currentEmployee.allAccess) {
            accessibleDepts = allDepts;
        } else {
            accessibleDepts = allDepts.filter(dept => currentEmployee.permissions[dept] && currentEmployee.permissions[dept].length > 0);
        }

        let html = `
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h2>Welcome, ${currentEmployee.name} ${currentEmployee.allAccess ? '<span class="all-access-badge">ALL ACCESS</span>' : ''}</h2>
                    <button onclick="showChangePassword()">Change Password</button>
                </div>
        `;
        if (accessibleDepts.length === 0) {
            html += `<p class="empty-msg">You have no department access. Please contact admin.</p>`;
        } else {
            let deptButtons = "";
            accessibleDepts.forEach(dept => {
                deptButtons += `<button class="dept-btn" onclick="selectDept('${dept}')">${dept}</button>`;
            });
            html += `<div class="dept-selector">${deptButtons}</div>`;
            html += `<div id="subtabArea"></div>`;
        }
        html += `<button class="secondary" onclick="logout()">Logout</button></div>`;
        document.getElementById("appContainer").innerHTML = html;
        if (accessibleDepts.length > 0) selectDept(accessibleDepts[0]);
    }

    function selectDept(deptName) {
        currentDept = deptName;
        document.querySelectorAll('.dept-btn').forEach(btn => {
            btn.classList.toggle('active', btn.innerText === deptName);
        });
        const departments = getDepartments();
        const allSubs = departments[deptName] || [];
        let allowedSubs = [];
        if (currentEmployee.allAccess) {
            allowedSubs = allSubs;
        } else {
            allowedSubs = currentEmployee.permissions[deptName] || [];
        }
        if (allowedSubs.length === 0) {
            document.getElementById("subtabArea").innerHTML = "<p>You have no access to any subtab in this department.</p>";
            return;
        }
        let subHtml = `<div class="subtab-selector">`;
        allowedSubs.forEach(sub => {
            subHtml += `<button class="subtab-btn" onclick="selectSubtab('${deptName}', '${sub}')">${sub}</button>`;
        });
        subHtml += `</div><div id="subtabContent"></div>`;
        document.getElementById("subtabArea").innerHTML = subHtml;
        selectSubtab(deptName, allowedSubs[0]);
    }

    function selectSubtab(dept, subtab) {
        document.querySelectorAll('.subtab-btn').forEach(btn => {
            btn.classList.toggle('active', btn.innerText === subtab);
        });
        let content = subtabContent[dept]?.[subtab] || "No content defined for this subtab yet. Admin can edit subtabContent in dept.html.";
        document.getElementById("subtabContent").innerHTML = `<div class="card"><h3>${subtab}</h3><p>${content}</p></div>`;
    }

    function showChangePassword() {
        document.getElementById("appContainer").innerHTML = `
            <div class="card" style="max-width:400px; margin:auto;">
                <h2>Change Password for ${currentEmployee.name}</h2>
                <input type="password" id="oldPass" placeholder="Current Password">
                <input type="password" id="newPass1" placeholder="New Password">
                <input type="password" id="newPass2" placeholder="Confirm New Password">
                <button onclick="changePassword()">Update</button>
                <button onclick="renderEmployeePanel()">Cancel</button>
                <div id="passMsg"></div>
            </div>
        `;
    }

    function changePassword() {
        const old = document.getElementById("oldPass").value;
        const new1 = document.getElementById("newPass1").value;
        const new2 = document.getElementById("newPass2").value;
        if (new1 !== new2) {
            document.getElementById("passMsg").innerHTML = '<span class="error">Passwords do not match</span>';
            return;
        }
        let employees = getEmployees();
        const idx = employees.findIndex(e => e.name === currentEmployee.name);
        if (idx === -1 || employees[idx].password !== old) {
            document.getElementById("passMsg").innerHTML = '<span class="error">Current password is incorrect</span>';
            return;
        }
        employees[idx].password = new1;
        localStorage.setItem("employees", JSON.stringify(employees));
        document.getElementById("passMsg").innerHTML = '<span class="success">Password changed. Please login again.</span>';
        setTimeout(() => logout(), 2000);
    }

    function logout() {
        sessionStorage.removeItem("loggedInEmp");
        currentEmployee = null;
        renderLogin();
    }

    // On load, check existing session
    window.onload = () => {
        const stored = sessionStorage.getItem("loggedInEmp");
        if (stored) {
            currentEmployee = JSON.parse(stored);
            renderEmployeePanel();
        } else {
            renderLogin();
        }
    };
</script>
</body>
</html>
