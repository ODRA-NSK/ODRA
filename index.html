<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ODRA – Management Information System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
        }

        /* Header styling */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #f8f9fa;
            padding: 15px 30px;
            border-bottom: 2px solid #dee2e6;
            flex-wrap: wrap;
        }

        /* Left: Logo - BIGGER */
        .logo img {
            height: 100px;      /* increased from 60px to 100px */
            width: auto;
            display: block;
        }

        /* Centre: Title & Subtitle */
        .title-section {
            text-align: center;
            flex-grow: 1;
        }

        .company-name {
            font-size: 1.8rem;
            font-weight: bold;
            color: #2c3e50;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #6c757d;
            margin-top: 8px;
        }

        /* Right side (empty, keeps title centered) */
        .right-placeholder {
            width: 100px; /* matches new logo width approx */
        }

        /* Responsive: stack on small screens */
        @media (max-width: 700px) {
            .header {
                flex-direction: column;
                text-align: center;
            }
            .logo {
                margin-bottom: 15px;
            }
            .right-placeholder {
                display: none;
            }
        }

        /* No extra content - body has no padding or margins */
        body {
            background-color: white;
        }
    </style>
</head>
<body>

<!-- ========== HEADER ONLY ========== -->
<div class="header">
    <div class="logo">
        <img src="logo1.jpg" alt="ODRA Logo">
    </div>
    <div class="title-section">
        <div class="company-name">Odra by Navya Sangam Kriti</div>
        <div class="subtitle">Management Information System</div>
    </div>
    <div class="right-placeholder"></div>
</div>

<!-- No welcome message, no description – just empty body -->

</body>
</html>
