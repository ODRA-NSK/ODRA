<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ODRA – Management Information System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #f8f9fa;
            padding: 15px 30px;
            border-bottom: 2px solid #dee2e6;
            flex-wrap: wrap;
        }

        /* Logo now wider (length increased) */
        .logo img {
            width: 200px;      /* adjust this value to make it longer/wider */
            height: auto;
            display: block;
        }

        .title-section {
            text-align: center;
            flex-grow: 1;
        }

        .company-name {
            font-size: 1.8rem;
            font-weight: bold;
            color: #2c3e50;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #6c757d;
            margin-top: 8px;
        }

        .right-placeholder {
            width: 200px; /* matches logo width to keep title centered */
        }

        @media (max-width: 700px) {
            .header {
                flex-direction: column;
                text-align: center;
            }
            .logo {
                margin-bottom: 15px;
            }
            .right-placeholder {
                display: none;
            }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">
        <img src="logo1.jpg" alt="ODRA Logo">
    </div>
    <div class="title-section">
        <div class="company-name">ODRA by Navya Sangam Kriti</div>
        <div class="subtitle">Management Information System</div>
    </div>
    <div class="nav-menu">
    <a href="index.html">Home</a>
    <a href="dept.html">Dept Wise</a>
</div>
</div>

</body>
</html>
